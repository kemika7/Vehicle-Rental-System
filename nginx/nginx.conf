upstream fastapi_app {
    server app:8000;
    keepalive 32;          # reuse connections to the upstream pool
}

server {
    listen 80;
    server_name _;         # catch-all; set your real domain name in production

    client_max_body_size 10M;

    # ── Proxy all traffic to FastAPI ────────────────────────────────────────
    location / {
        proxy_pass         http://fastapi_app;
        proxy_http_version 1.1;

        # Required for WebSocket support (FastAPI lifespan / SSE streams).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward real client information.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 5s;

        # Disable buffering so streaming responses (e.g. SSE) are flushed
        # immediately to the client.
        proxy_buffering off;
    }

    # ── OpenAPI / Swagger static assets served by FastAPI itself ────────────
    # FastAPI bundles its own Swagger UI; no separate static location needed.

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"        always;
    add_header X-Frame-Options         "DENY"           always;
    add_header Referrer-Policy         "no-referrer"    always;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 512;
}
